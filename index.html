<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>colhounS24 | Software Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #3b82f6;
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --border: #334155;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
  scroll-behavior: smooth;
}

body {
  background: var(--bg);
  color: var(--text);
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1.2rem 8%;
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 1000;
}

nav h2 {
  font-weight: 600;
  letter-spacing: 1px;
}

nav a {
  text-decoration: none;
  color: var(--muted);
  margin-left: 1.5rem;
  font-weight: 500;
  transition: 0.3s;
}

nav a:hover {
  color: white;
}

/* HERO */
.hero {
  padding: 7rem 8% 5rem;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 4rem;
  border-bottom: 1px solid var(--border);
}

.hero-text {
  max-width: 550px;
}

.hero-text h1 {
  font-size: 3rem;
  margin-bottom: 1rem;
}

.hero-text h3 {
  color: var(--primary);
  font-weight: 500;
  margin-bottom: 1.5rem;
}

.hero-text p {
  color: var(--muted);
  margin-bottom: 2rem;
  line-height: 1.6;
}

.hero-buttons a {
  display: inline-block;
  padding: 0.8rem 1.6rem;
  border-radius: 30px;
  text-decoration: none;
  font-weight: 600;
  margin-right: 1rem;
  transition: 0.3s;
}

.primary-btn {
  background: var(--primary);
  color: white;
}

.primary-btn:hover {
  background: #2563eb;
}

.secondary-btn {
  border: 1px solid var(--border);
  color: var(--text);
}

.secondary-btn:hover {
  background: var(--card);
}

.hero img {
  width: 170px;
  border-radius: 50%;
  border: 4px solid var(--primary);
  box-shadow: 0 0 40px rgba(59,130,246,0.4);
}

/* SECTION */
section {
  padding: 5rem 8%;
}

h2 {
  text-align: center;
  margin-bottom: 3rem;
  font-size: 2rem;
}

/* PROJECT CARDS */
.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 2rem;
}

.card {
  background: linear-gradient(145deg, #1e293b, #19212f);
  padding: 2rem;
  border-radius: 16px;
  border: 1px solid var(--border);
  transition: 0.4s ease;
  position: relative;
  overflow: hidden;
}

.card:hover {
  transform: translateY(-8px);
  border-color: var(--primary);
  box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}

.card h3 {
  margin-bottom: 0.8rem;
}

.card p {
  color: var(--muted);
  margin-bottom: 1rem;
}

.badges {
  margin-bottom: 1rem;
}

.badges span {
  background: var(--primary);
  color: white;
  font-size: 0.7rem;
  padding: 0.3rem 0.7rem;
  border-radius: 20px;
  margin-right: 0.4rem;
}

.card-buttons a {
  text-decoration: none;
  font-size: 0.85rem;
  margin-right: 1rem;
  color: var(--primary);
  font-weight: 600;
}

/* CONTACT */
.contact form {
  max-width: 600px;
  margin: auto;
  display: flex;
  flex-direction: column;
}

.contact input, .contact textarea {
  padding: 1rem;
  margin-bottom: 1rem;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: white;
}

.contact button {
  padding: 0.8rem;
  border-radius: 30px;
  border: none;
  background: var(--primary);
  color: white;
  font-weight: 600;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 2rem;
  border-top: 1px solid var(--border);
  color: var(--muted);
}
</style>
</head>

<body>

<nav>
  <h2>colhounS24</h2>
  <div>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-text">
    <h1>colhounS24</h1>
    <h3>Software Developer</h3>
    <p>
      I build modern, scalable applications with clean architecture and strong attention to performance and usability.
    </p>
    <div class="hero-buttons">
      <a href="#projects" class="primary-btn">View Projects</a>
      <a href="resume.pdf" class="secondary-btn" download>Download Resume</a>
    </div>
  </div>

  <img src="https://avatars.githubusercontent.com/colhounS24" alt="Profile">
</section>

<section id="projects">
  <h2>Featured GitHub Projects</h2>
  <div class="projects" id="repo-container"></div>
</section>

<section id="contact" class="contact">
  <h2>Contact</h2>
  <form action="https://formspree.io/f/yourFormID" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="_replyto" placeholder="Your Email" required>
    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</section>

<footer>
  © 2026 colhounS24 · Built with GitHub Pages
</footer>

<script>
fetch("https://api.github.com/users/colhounS24/repos?sort=updated")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("repo-container");
    data.slice(0,6).forEach(repo => {
      const card = document.createElement("div");
      card.classList.add("card");
      card.innerHTML = `
        <h3>${repo.name}</h3>
        <p>${repo.description || "No description provided."}</p>
        <div class="badges">
          ${repo.language ? `<span>${repo.language}</span>` : ""}
        </div>
        <div class="card-buttons">
          <a href="${repo.html_url}" target="_blank">Code →</a>
          ${repo.homepage ? `<a href="${repo.homepage}" target="_blank">Live Demo →</a>` : ""}
        </div>
      `;
      container.appendChild(card);
    });
  });
</script>

</body>
</html>
