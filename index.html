<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>colhounS24 | Software Developer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #3b82f6;
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --border: #334155;
  --success: #22c55e;
  --error: #ef4444;
  --shadow: rgba(59,130,246,0.4);
}

/* Reset */
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; scroll-behavior:smooth; }
body { background: var(--bg); color: var(--text); line-height:1.6; }

/* NAVBAR */
nav {
  display:flex; justify-content:space-between; align-items:center;
  padding:1rem 5%; position:sticky; top:0; z-index:1000;
  background: rgba(15,23,42,0.85); backdrop-filter:blur(8px);
  border-bottom:1px solid var(--border);
}
nav h2 { font-weight:600; font-size:1.4rem; }
.nav-links {
  display:flex; gap:1.5rem;
}
.nav-links a { text-decoration:none; color: var(--muted); font-weight:500; transition:0.3s; }
.nav-links a:hover { color:white; }

/* HAMBURGER */
.hamburger {
  display:none; flex-direction:column; cursor:pointer; gap:5px;
}
.hamburger div { width:25px; height:3px; background:white; transition:0.3s; }

/* HERO */
.hero {
  display:flex; flex-wrap: wrap; justify-content:center; align-items:center;
  gap:3rem; padding:6rem 5rem; background: linear-gradient(135deg,#2563eb,#1e3a8a);
  color:white; border-bottom:1px solid var(--border); border-radius:0 0 20px 20px;
}
.hero-text { max-width:550px; text-align:center; }
.hero-text h1 { font-size:3rem; margin-bottom:0.5rem; }
.hero-text h3 { color: var(--primary); font-weight:500; margin-bottom:1rem; }
.hero-text p { color: #e2e8f0; margin-bottom:2rem; line-height:1.6; }
.hero-buttons a {
  display:inline-block; padding:0.8rem 1.8rem; border-radius:30px; font-weight:600; margin:0.4rem; text-decoration:none;
  transition:0.3s;
}
.primary-btn { background: var(--primary); color:white; }
.primary-btn:hover { background:#2563eb; }
.secondary-btn { border:1px solid white; color:white; }
.secondary-btn:hover { background:rgba(255,255,255,0.1); }
.hero img { width:180px; border-radius:50%; border:4px solid var(--primary); box-shadow:0 0 40px var(--shadow); }

/* SECTIONS */
section { padding:4rem 5%; }
h2 { text-align:center; margin-bottom:3rem; font-size:2rem; }

/* PROJECT CARDS */
.projects { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:2rem; }
.card {
  background: var(--card); padding:2rem; border-radius:16px; border:1px solid var(--border);
  transition:0.4s ease; overflow:hidden; opacity:0; transform: translateY(40px);
}
.card.visible { opacity:1; transform: translateY(0); }
.card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
.card h3 { margin-bottom:0.8rem; font-size:1.3rem; }
.card p { color: var(--muted); margin-bottom:1rem; font-size:0.9rem; }
.badges span { background: var(--primary); color:white; font-size:0.7rem; padding:0.3rem 0.7rem; border-radius:20px; margin-right:0.4rem; }
.card-buttons a { text-decoration:none; font-size:0.85rem; margin-right:1rem; color: var(--primary); font-weight:600; }

/* CONTACT */
.contact form { max-width:600px; margin:auto; display:flex; flex-direction:column; }
.contact input, .contact textarea {
  padding:1rem; margin-bottom:1rem; border-radius:8px; border:1px solid var(--border); background: var(--card); color:white;
  font-size:0.95rem;
}
.contact button { padding:0.8rem; border-radius:30px; border:none; background:var(--primary); color:white; font-weight:600; cursor:pointer; transition:0.3s; }
.contact button.loading { opacity:0.7; pointer-events:none; }
#form-status { margin-top:1rem; font-weight:500; opacity:0; transition:opacity 0.4s ease; }
#form-status.success { color: var(--success); opacity:1; }
#form-status.error { color: var(--error); opacity:1; }

/* FOOTER */
footer { text-align:center; padding:2rem; border-top:1px solid var(--border); color: var(--muted); }

/* RESPONSIVE */
@media(max-width:768px){
  .nav-links { display:none; position:absolute; top:70px; left:0; width:100%; background: rgba(15,23,42,0.95); flex-direction:column; padding:1rem 0; }
  .nav-links.active { display:flex; }
  .nav-links a { padding:1rem; text-align:center; }
  .hamburger { display:flex; }
  .hero { flex-direction:column; text-align:center; padding:5rem 2rem; }
  .hero-text h1 { font-size:2.2rem; }
  .hero-text h3 { font-size:1.3rem; }
  .hero-buttons a { width:100%; text-align:center; margin-bottom:0.5rem; }
}
</style>
</head>
<body>

<nav>
  <h2>colhounS24</h2>
  <div class="hamburger" id="hamburger">
    <div></div><div></div><div></div>
  </div>
  <div class="nav-links" id="nav-links">
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-text">
    <h1>colhounS24</h1>
    <h3>Software Developer</h3>
    <p>I build modern, scalable applications with clean architecture and strong attention to performance and usability.</p>
    <div class="hero-buttons">
      <a href="#projects" class="primary-btn">View Projects</a>
      <a href="resume.pdf" class="secondary-btn" download>Download Resume</a>
    </div>
  </div>
  <img src="https://avatars.githubusercontent.com/colhounS24" alt="Profile">
</section>

<section id="projects">
  <h2>Featured GitHub Projects</h2>
  <div class="projects" id="repo-container"></div>
</section>

<section id="contact" class="contact">
  <h2>Contact</h2>
  <form id="contact-form">
    <input type="hidden" name="_subject" value="New message from portfolio site">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
    <button type="submit" id="submit-btn">Send Message</button>
    <div id="form-status"></div>
  </form>
</section>

<footer>© 2026 colhounS24 · Built with GitHub Pages</footer>

<script>
/* Hamburger menu toggle */
const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('nav-links');
hamburger.addEventListener('click', () => {
  navLinks.classList.toggle('active');
});

/* Load GitHub Repos */
fetch("https://api.github.com/users/colhounS24/repos?sort=updated")
  .then(res=>res.json())
  .then(data=>{
    const container=document.getElementById("repo-container");
    data.slice(0,6).forEach(repo=>{
      const card=document.createElement("div");
      card.classList.add("card");
      card.innerHTML=`<h3>${repo.name}</h3>
<p>${repo.description||"No description provided."}</p>
<div class="badges">${repo.language?`<span>${repo.language}</span>`:""}</div>
<div class="card-buttons">
<a href="${repo.html_url}" target="_blank">Code →</a>
${repo.homepage?`<a href="${repo.homepage}" target="_blank">Live Demo →</a>`:""}
</div>`;
      container.appendChild(card);
    });
    const observer = new IntersectionObserver(entries=>{
      entries.forEach(entry=>{if(entry.isIntersecting){entry.target.classList.add("visible");}});
    },{threshold:0.2});
    document.querySelectorAll(".card").forEach(card=>observer.observe(card));
  });

/* Contact Form AJAX */
const form=document.getElementById("contact-form");
const statusDiv=document.getElementById("form-status");
const button=document.getElementById("submit-btn");
form.addEventListener("submit",async e=>{
  e.preventDefault();
  button.classList.add("loading");
  button.textContent="Sending...";
  const formData=new FormData(form);
  try{
    const response=await fetch("https://formspree.io/f/YOUR_FORM_ID",{method:"POST",body:formData,headers:{'Accept':'application/json'}});
    if(response.ok){
      form.reset();
      statusDiv.textContent="✅ Message sent successfully!";
      statusDiv.className="success";
      button.textContent="Sent ✓";
      setTimeout(()=>{button.textContent="Send Message"; button.classList.remove("loading");},2000);
    } else{throw new Error();}
  } catch(error){
    statusDiv.textContent="❌ Something went wrong. Please try again.";
    statusDiv.className="error";
    button.classList.remove("loading");
    button.textContent="Send Message";
  }
});
</script>
</body>
</html>
